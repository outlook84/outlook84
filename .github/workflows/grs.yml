name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate yet-another-rclone-dashboard card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=yet-another-rclone-dashboard&theme=transparent
          path: profile/yet-another-rclone-dashboard.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate homer-go card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=homer-go&theme=transparent
          path: profile/homer-go.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate journal-scope card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=journal-scope&theme=transparent
          path: profile/journal-scope.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate openlist-tvbox-gateway card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=openlist-tvbox-gateway&theme=transparent
          path: profile/openlist-tvbox-gateway.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate mpv-handler-openlist card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=mpv-handler-openlist&theme=transparent
          path: profile/mpv-handler-openlist.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate mpv-webp-avif-generator card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=mpv-webp-avif-generator&theme=transparent
          path: profile/mpv-webp-avif-generator.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate astrbot_plugin_telethon_adapter card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=astrbot_plugin_telethon_adapter&theme=transparent
          path: profile/astrbot_plugin_telethon_adapter.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
